# Workflow for building and deploying a Next.js site to GitHub Pages
#
name: Deploy Next.js site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with: {}
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            apps/web/.next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
      - name: Install dependencies
        run: pnpm install
      - name: Build public site
        run: pnpm turbo build --filter=@neon/web
      - name: Build admin for GitHub Pages
        run: pnpm turbo build --filter=@neon/admin
        env:
          VITE_ADMIN_BASE: /admin/
          VITE_PUBLIC_SITE_URL: https://neoncollective.ch
          VITE_ADMIN_BUILD_LABEL: ${{ github.sha }}
      - name: Build door for GitHub Pages
        run: pnpm turbo build --filter=@neon/door
        env:
          VITE_DOOR_BASE: /door/
          VITE_PUBLIC_SITE_URL: https://neoncollective.ch
          VITE_EVENTS_API_URL: https://api.neoncollective.ch/neo-events-api
          VITE_DOOR_BUILD_LABEL: ${{ github.sha }}
      - name: Merge admin and door into Pages artifact
        run: |
          mkdir -p apps/web/out/admin apps/web/out/door
          cp -r apps/admin/dist/* apps/web/out/admin/
          cp -r apps/door/dist/* apps/web/out/door/
      - name: Patch 404 for admin and door SPA deep links
        run: node scripts/patch-github-pages-admin-404.mjs
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/web/out

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
